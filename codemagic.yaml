workflows:
  ios-workflow-id:
    name: iOS Sample Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: "App Store Connect API"

    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store # or: ad_hoc | development | enterprise
#        bundle_identifier: net.iperon.messenger

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper
        - $HOME/.cocoapods

    scripts:
      - name: Install Flutter dependencies
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Initialize keychain
        script: keychain initialize

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$IOS_BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      # Добавление сертификатов в связку
      - name: Add certificates to keychain
        script: keychain add-certificates

      # Применение профилей к Xcode проекту
      - name: Set up code signing settings
        script: xcode-project use-profiles

      # Автоматическое увеличение номера сборки
      - name: Increment build number
        script: |
          cd ios
          agvtool new-version -all $(($PROJECT_BUILD_NUMBER))
          cd ..

      # Сборка IPA
      - name: Build IPA
        script: |
          flutter build ipa --release --obfuscate --split-debug-info=build/ios/symbols

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      # ОПЦИОНАЛЬНО: автоматическая загрузка в TestFlight
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # submit_to_app_store: false  # раскомментировать для публикации в App Store

      # Уведомления об успехе/ошибке
      email:
        recipients:
          - info@iperon.net
        notify:
          success: true
          failure: true




