version: 2
updates:
  - package-ecosystem: "github-actions"
    directories: [".github/workflows", ".github/actions/**"]
    schedule:
      interval: "weekly"
  - package-ecosystem: "pub"
    directories:  ["/"]
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
