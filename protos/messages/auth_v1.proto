syntax = "proto3";

package iperon.v1;
option go_package = "internal/api/messages";

import "google/protobuf/timestamp.proto";

message AuthRequest {
  bytes session = 1;
  string osVersion = 2;
  string appVersion = 3;
  string appBuildNumber = 4;
}

message AuthResponse {
  bytes salt = 1;
  google.protobuf.Timestamp serverAt = 2;
}

