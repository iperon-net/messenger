syntax = "proto3";

package iperon.v1;
option go_package = "internal/api/messages";

import "google/protobuf/timestamp.proto";

message Session {
  string deviceModel = 1;
  string osVersion = 2;
  string appVersion = 3;
  string appBuildNumber = 4;
  string locationRussian = 5;
  string locationEnglish = 6;
  google.protobuf.Timestamp updateAt = 7;
}

message SessionsRequest {}

message SessionsResponse {
  repeated Session sessions = 1;
}
