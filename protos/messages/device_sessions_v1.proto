syntax = "proto3";

package iperon.v1;
option go_package = "internal/api/messages";

import "google/protobuf/timestamp.proto";

message DeviceSession {
  bytes sessionID  = 1;
  string deviceModel = 2;
  int32 os = 3;
  string osVersion = 4;
  string appVersion = 5;
  string appBuildNumber = 6;
  google.protobuf.Timestamp updateAt = 7;
  string locationRussian = 8;
  string locationEnglish = 9;
}

message DeviceSessionsRequest {}

message DeviceSessionsResponse {
  repeated DeviceSession deviceSessions = 1;
}

message DeviceSessionsLogoutRequest {
  repeated bytes sessionID = 1;
}

message DeviceSessionsLogoutResponse {}
