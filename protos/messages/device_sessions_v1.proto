syntax = "proto3";

package iperon.v1;
option go_package = "internal/api/messages";

import "google/protobuf/timestamp.proto";

message DeviceSession {
  string deviceModel = 1;
  int32 os = 2;
  string osVersion = 3;
  string appVersion = 5;
  string appBuildNumber = 6;
  string locationRussian = 7;
  string locationEnglish = 8;
  google.protobuf.Timestamp updateAt = 9;
}

message DeviceSessionsRequest {}

message DeviceSessionsResponse {
  repeated DeviceSession deviceSessions = 1;
}

