syntax = "proto3";

package iperon.v1;
option go_package = "internal/api/v1";

import "protos/models.proto";
import "google/protobuf/timestamp.proto";

service Auth {
  rpc CallPassword (AuthCallPasswordRequest) returns (AuthCallPasswordResponse) {}
  rpc CallPasswordCheck (AuthCallPasswordCheckRequest) returns (stream AuthCallPasswordCheckResponse) {}
  rpc SMS (AuthSMSRequest) returns (AuthSMSResponse) {}
  rpc SMSCheck (AuthSMSCheckRequest) returns (AuthSMSCheckResponse) {}
  rpc Confirmation (AuthConfirmationRequest) returns (AuthConfirmationResponse) {}
}

// CallPassword
message AuthCallPasswordRequest {
  string phoneNumber = 1;
}

message AuthCallPasswordResponse {
  bytes callPasswordSession = 1;
  float timeout = 2;
  string confirmationPhoneNumber = 3;
}

// Call Password Check
message AuthCallPasswordCheckRequest {
  bytes callPasswordSession = 1;
}

message AuthCallPasswordCheckResponse {
  Status status = 1;
  optional int64 timer = 2;
  optional string errorMessage = 3;
  optional bytes confirmationSession = 4;
  optional bool hasTwoStepVerification = 5;
  optional bool isBlocked = 6;
}

// SMS
message AuthSMSRequest {
  string phoneNumber = 1;
}

message AuthSMSResponse {
  bytes smsSession = 1;
}

// SMS Check
message AuthSMSCheckRequest {
  bytes smsSession = 1;
  string verificationCode = 2;
}

message AuthSMSCheckResponse {
  optional bytes confirmationSession = 1;
  optional bool hasTwoStepVerification = 2;
  optional bool isBlocked = 3;
}


// Confirmation
message AuthConfirmationRequest {
  bytes confirmationSession = 1;

  bytes cipherTextSharedKey = 2;
  bytes cipherTextSalt = 3;

  string deviceModel = 4;
  int32 os = 5;
  string osVersion = 6;
  string appVersion = 7;
  string appBuildNumber = 8;
}

message AuthConfirmationResponse {
  bytes sessionID = 1;
  bytes session = 2;

  bytes cipherTextSharedKey = 3;
  bytes cipherTextSalt = 4;

  bytes signatureSharedKey = 5;
  bytes signatureSalt = 6;

  bytes userID = 7;
  string phoneNumber = 8;
  google.protobuf.Timestamp createdAt = 9;
}
